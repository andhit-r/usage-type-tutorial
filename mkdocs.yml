site_name: SSI Product Usage Type — Tutorial
site_description: >
  Dokumentasi penggunaan Product Usage Type pada modul HR Expense
  (Reimbursement, Cash Advance, Cash Advance Settlement) di Odoo 14 SSI.
site_author: PT. Simetri Sinergi Indonesia
docs_dir: docs
repo_url: https://github.com/open-synergy/usage-type-tutorial
edit_uri: edit/main/docs/

theme:
  name: material
  language: id
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Beranda: index.md
  - Konsep Dasar:
      - Product Usage Type: concept/product-usage-type.md
      - Mixin Product Line Account: concept/mixin-product-line-account.md
      - Alur Resolusi Akun: concept/account-resolution.md
  - Penerapan:
      - Overview: use-cases/index.md
      - Reimbursement: use-cases/reimbursement.md
      - Cash Advance: use-cases/cash-advance.md
      - Cash Advance Settlement: use-cases/cash-advance-settlement.md
  - Referensi:
      - Ringkasan Perbandingan: reference/comparison.md
